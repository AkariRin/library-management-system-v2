# Application configuration
spring.application.name=library-management-system

# Server configuration
server.port=${SERVER_PORT:8000}
server.servlet.context-path=
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# MySQL Configuration
spring.datasource.url=jdbc:${DB_URL:mysql://localhost:3306/lms}
spring.datasource.username=${DB_USERNAME:lms}
spring.datasource.password=${DB_PASSWORD:lms_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.serialization.value-type=com.fasterxml.jackson.databind.ObjectMapper

# Spring Session Configuration
spring.session.store-type=redis
spring.session.redis.namespace=library:session
spring.session.redis.flush-mode=on_save
spring.session.redis.save-mode=on_set_attribute
server.servlet.session.timeout=30m
spring.session.cookie.secure=true

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Static resources configuration (for frontend)
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.add-mappings=true
